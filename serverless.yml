org: tobiastac
service: mailer

provider:
  name: aws
  runtime: nodejs20.x
  architecture: arm64
  region: sa-east-1
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - ses:SendEmail
          Resource: '*'

build:
  esbuild:
    minify: true
    bundle: true
    sourcemap: false
    exclude:
      - '@aws-sdk/*'

functions:
  sendMail:
    handler: src/functions/sendMail.handler
    events:
      - httpApi:
          path: /send
          method: POST
